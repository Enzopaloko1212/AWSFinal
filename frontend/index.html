<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Attendance System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #c0392b;
      --red-dark: #a93226;
      --red-light: #e74c3c;
      --white: #ffffff;
      --gray: #f5f5f5;
      --gray-border: #ddd;
      --text: #222;
      --text-muted: #666;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--gray);
      color: var(--text);
      min-height: 100dvh;
    }

    header {
      background: var(--red);
      color: var(--white);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    header svg { flex-shrink: 0; }

    header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.02em; }
    header p  { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }

    nav {
      background: var(--white);
      display: flex;
      border-bottom: 2px solid var(--gray-border);
    }

    nav button {
      flex: 1;
      padding: 14px;
      border: none;
      background: none;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }

    nav button.active {
      color: var(--red);
      border-bottom-color: var(--red);
      background: #fef5f5;
    }

    nav button:hover:not(.active) { background: var(--gray); }

    main { max-width: 560px; margin: 32px auto; padding: 0 16px 40px; }

    .tab { display: none; }
    .tab.active { display: block; }

    .card {
      background: var(--white);
      border-radius: 10px;
      padding: 28px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--gray-border);
    }

    label {
      display: block;
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 5px;
      margin-top: 14px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input[type="text"],
    input[type="email"],
    input[type="date"],
    input[type="file"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--gray-border);
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--red); }

    .btn {
      display: block;
      width: 100%;
      margin-top: 22px;
      padding: 12px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.03em;
    }

    .btn:hover { background: var(--red-dark); }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 6px;
      font-size: 0.9rem;
      display: none;
    }

    .status.success { background: #eafaf1; color: #1e8449; border: 1px solid #a9dfbf; display: block; }
    .status.error   { background: #fdf2f2; color: var(--red-dark); border: 1px solid #f5c6cb; display: block; }
    .status.info    { background: #eaf4fb; color: #1a5276; border: 1px solid #aed6f1; display: block; }

    /* Webcam */
    .cam-wrap {
      position: relative;
      background: #111;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 14px;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #video { width: 100%; display: block; }
    #canvas { display: none; }

    .cam-placeholder {
      color: #aaa;
      font-size: 0.9rem;
      text-align: center;
      padding: 20px;
    }

    .cam-controls { display: flex; gap: 10px; margin-top: 10px; }
    .cam-controls .btn { margin-top: 0; flex: 1; }
    .btn-outline {
      background: var(--white);
      color: var(--red);
      border: 2px solid var(--red);
    }
    .btn-outline:hover { background: #fef5f5; }

    /* Records table */
    .table-wrap { overflow-x: auto; margin-top: 16px; }

    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th {
      background: var(--red);
      color: var(--white);
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
    }
    td { padding: 9px 12px; border-bottom: 1px solid var(--gray-border); }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) td { background: #fafafa; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 700;
      background: #eafaf1;
      color: #1e8449;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
    <circle cx="18" cy="18" r="18" fill="white" fill-opacity="0.15"/>
    <circle cx="18" cy="13" r="5" fill="white"/>
    <path d="M8 28c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </svg>
  <div>
    <h1>Smart Attendance System</h1>
    <p>Group 1 &mdash; UA&amp;P Advanced Cloud Computing</p>
  </div>
</header>

<nav>
  <button class="active" onclick="switchTab('register', this)">Register</button>
  <button onclick="switchTab('checkin', this)">Check In</button>
  <button onclick="switchTab('records', this)">Records</button>
</nav>

<main>

  <!-- TAB 1: REGISTER -->
  <div id="tab-register" class="tab active">
    <div class="card">
      <h2>Register Student</h2>
      <label>Student ID</label>
      <input type="text" id="reg-id" placeholder="e.g. 2023-001" />
      <label>Full Name</label>
      <input type="text" id="reg-name" placeholder="e.g. Juan dela Cruz" />
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="e.g. juan@example.com" />
      <label>Photo</label>
      <input type="file" id="reg-photo" accept="image/*" />
      <button class="btn" id="reg-btn" onclick="registerStudent()">Register Student</button>
      <div class="status" id="reg-status"></div>
    </div>
  </div>

  <!-- TAB 2: CHECK IN -->
  <div id="tab-checkin" class="tab">
    <div class="card">
      <h2>Face Check-In</h2>
      <div class="cam-wrap">
        <video id="video" autoplay playsinline></video>
        <div class="cam-placeholder" id="cam-placeholder">Camera not started</div>
      </div>
      <canvas id="canvas"></canvas>
      <div class="cam-controls">
        <button class="btn btn-outline" onclick="startCamera()">Start Camera</button>
        <button class="btn" id="snap-btn" onclick="snapAndCheckin()" disabled>Capture &amp; Check In</button>
      </div>
      <div style="margin-top:14px; text-align:center; color:var(--text-muted); font-size:0.85rem;">— or upload a photo —</div>
      <input type="file" id="checkin-photo" accept="image/*" style="margin-top:10px;" onchange="uploadAndCheckin()" />
      <div class="status" id="checkin-status"></div>
    </div>
  </div>

  <!-- TAB 3: RECORDS -->
  <div id="tab-records" class="tab">
    <div class="card">
      <h2>Attendance Records</h2>
      <label>Student ID</label>
      <input type="text" id="rec-id" placeholder="e.g. 2023-001" />
      <label>From</label>
      <input type="date" id="rec-from" />
      <label>To</label>
      <input type="date" id="rec-to" />
      <button class="btn" id="rec-btn" onclick="fetchRecords()">Search Records</button>
      <div class="status" id="rec-status"></div>
      <div class="table-wrap" id="rec-table-wrap" style="display:none;">
        <table>
          <thead><tr><th>#</th><th>Date</th><th>Time</th><th>Status</th></tr></thead>
          <tbody id="rec-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<script>
  const API = 'https://o1z930ez5d.execute-api.ap-southeast-1.amazonaws.com/prod';

  function switchTab(name, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  function setStatus(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  function toBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  // ── REGISTER ────────────────────────────────────────────────────────────────
  async function registerStudent() {
    const id    = document.getElementById('reg-id').value.trim();
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const file  = document.getElementById('reg-photo').files[0];

    if (!id || !name || !email || !file) {
      return setStatus('reg-status', 'Please fill in all fields and select a photo.', 'error');
    }

    const btn = document.getElementById('reg-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Registering...';
    setStatus('reg-status', 'Uploading and processing...', 'info');

    try {
      const photoBase64 = await toBase64(file);
      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ studentId: id, name, email, photoBase64 }),
      });
      const data = await res.json();
      if (res.ok) {
        setStatus('reg-status', `✓ ${name} registered successfully! Face ID: ${data.faceId}`, 'success');
      } else {
        setStatus('reg-status', `Error: ${data.error}`, 'error');
      }
    } catch (e) {
      setStatus('reg-status', 'Network error. Check console.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Register Student';
    }
  }

  // ── CAMERA ──────────────────────────────────────────────────────────────────
  let stream = null;

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
      const video = document.getElementById('video');
      video.srcObject = stream;
      document.getElementById('cam-placeholder').style.display = 'none';
      video.style.display = 'block';
      document.getElementById('snap-btn').disabled = false;
    } catch (e) {
      setStatus('checkin-status', 'Camera access denied. Use file upload instead.', 'error');
    }
  }

  async function snapAndCheckin() {
    const video  = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const photoBase64 = canvas.toDataURL('image/jpeg').split(',')[1];
    await doCheckin(photoBase64);
  }

  async function uploadAndCheckin() {
    const file = document.getElementById('checkin-photo').files[0];
    if (!file) return;
    const photoBase64 = await toBase64(file);
    await doCheckin(photoBase64);
  }

  async function doCheckin(photoBase64) {
    const btn = document.getElementById('snap-btn');
    btn.disabled = true;
    setStatus('checkin-status', 'Identifying face...', 'info');

    try {
      const res = await fetch(`${API}/checkin`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ photoBase64 }),
      });
      const data = await res.json();
      if (res.ok && data.matched) {
        const ts = new Date(data.timestamp).toLocaleString('en-PH', { timeZone: 'Asia/Manila' });
        setStatus('checkin-status', `✓ Welcome, ${data.name}! Attendance recorded at ${ts}. Confirmation email sent.`, 'success');
      } else {
        setStatus('checkin-status', data.error || 'Face not recognized. Please register first.', 'error');
      }
    } catch (e) {
      setStatus('checkin-status', 'Network error. Check console.', 'error');
    } finally {
      btn.disabled = false;
    }
  }

  // ── RECORDS ─────────────────────────────────────────────────────────────────
  async function fetchRecords() {
    const id   = document.getElementById('rec-id').value.trim();
    const from = document.getElementById('rec-from').value;
    const to   = document.getElementById('rec-to').value;

    if (!id || !from || !to) {
      return setStatus('rec-status', 'Please fill in Student ID and both dates.', 'error');
    }

    const btn = document.getElementById('rec-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Searching...';
    document.getElementById('rec-table-wrap').style.display = 'none';
    setStatus('rec-status', 'Fetching records...', 'info');

    try {
      const res = await fetch(`${API}/records?studentId=${encodeURIComponent(id)}&from=${from}&to=${to}`);
      const data = await res.json();

      if (res.status === 404 || !data.records?.length) {
        setStatus('rec-status', 'No attendance records found for that range.', 'info');
      } else if (res.ok) {
        setStatus('rec-status', `Found ${data.count} record(s).`, 'success');
        const tbody = document.getElementById('rec-tbody');
        tbody.innerHTML = data.records.map((r, i) => {
          const dt = new Date(r.timestamp);
          const date = dt.toLocaleDateString('en-PH', { timeZone: 'Asia/Manila' });
          const time = dt.toLocaleTimeString('en-PH', { timeZone: 'Asia/Manila' });
          return `<tr>
            <td>${i + 1}</td>
            <td>${date}</td>
            <td>${time}</td>
            <td><span class="badge">${r.status}</span></td>
          </tr>`;
        }).join('');
        document.getElementById('rec-table-wrap').style.display = 'block';
      } else {
        setStatus('rec-status', `Error: ${data.error}`, 'error');
      }
    } catch (e) {
      setStatus('rec-status', 'Network error. Check console.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Search Records';
    }
  }
</script>
</body>
</html>
